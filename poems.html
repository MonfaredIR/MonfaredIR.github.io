<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>اشعار | منفرد</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <style>
    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .poem {
      background: #1a1a1a;
      margin: 15px 0;
      padding: 20px;
      border-radius: 12px;
      cursor: pointer;
    }

    .poem h3 {
      color: #f5c542;
      margin-bottom: 10px;
    }

    .back {
      display: inline-block;
      margin: 20px 0;
      color: #f5c542;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">

  <a class="back" href="index.html">← بازگشت به صفحه اصلی</a>

  <h1>اشعار من</h1>

  <div class="poem">
    <h3>نمونه شعر ۱</h3>
    <p>
      اینجا متن شعر تو قرار می‌گیرد...
    </p>
  </div>

  <div class="poem">
    <h3>نمونه شعر ۲</h3>
    <p>
      اینجا متن شعر دوم قرار می‌گیرد...
    </p>
  </div>

  <div class="poem">
    <h3>نمونه شعر ۳</h3>
    <p>
      اینجا متن شعر سوم قرار می‌گیرد...
    </p>
  </div>

</div>

</body>
</html>
